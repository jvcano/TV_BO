# Logrotate config for TV_BO logs
#
# Install on the Linux server with:
#   sudo cp /root/TV_BO/logrotate.conf /etc/logrotate.d/tv_bo
#   sudo chown root:root /etc/logrotate.d/tv_bo
#   sudo chmod 644 /etc/logrotate.d/tv_bo
#
# Test (dry run):
#   sudo logrotate -d /etc/logrotate.d/tv_bo
#
# Force a rotation:
#   sudo logrotate -f /etc/logrotate.d/tv_bo

/root/TV_BO/logs/*.log {
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
}
